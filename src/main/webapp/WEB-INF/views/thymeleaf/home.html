<!-- Solo dejamos la estructura necesaria para que el IDE no tire error,
     pero Thymeleaf solo usará los fragmentos -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/app :: layout(~{::content}, _, ~{::header_center}, ~{::header_right})}">
<head>
  <title>Categorías</title>
</head>
<body>

<!-- FRAGMENTO 1 -->
<div th:fragment="header_center">
  <span class="text-puesto-header-text font-bold uppercase tracking-widest">Seleccione Categoría</span>
</div>

<!-- FRAGMENTO 2 -->
<div th:fragment="header_right">
  <a th:href="@{/dashboard/global}"
     class="hidden md:flex items-center px-4 py-2 bg-black/10 hover:bg-black/20 rounded-lg border border-white/20 transition text-xs font-bold uppercase tracking-wider">
    Dashboard Global
  </a>
  <p class="text-white">Cantidad de categorías: <span th:text="${#lists.size(categorias)}"></span></p>
</div>

<!-- FRAGMENTO 3 (EL CONTENIDO) -->
<!-- Quitamos el div extra que tiene 'min-h-screen' para que no choque con el 'main' del layout -->

<div th:fragment="content" class="p-6">
  <!-- Sección solo para ADMIN -->
  <div th:if="${session.ROL == 'ADMIN'}" class="mb-8 p-4 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 rounded-lg shadow-inner">
      <h2 class="font-bold text-xl mb-2">Panel de Control de Administrador</h2>
      <p class="text-sm">¡Bienvenido, tienes acceso a funciones privilegiadas!</p>
      <div class="mt-4 flex gap-4">
          <a href="#" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition font-bold">Gestionar Usuarios</a>
          <a href="#" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition font-bold">Ver Estadísticas Avanzadas</a>
      </div>
  </div>

  <!-- Si la lista está vacía, esto no se verá nada -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 pb-10">
    <!-- Agregamos th:classappend para que cada iteración tenga su propio tema -->
    <a th:each="categoria : ${categorias}"
       th:href="@{/category/{id}/products(id=${categoria.id})}"
       th:classappend="' ' + ${categoria.tema}"
       class="group relative flex flex-col items-center justify-center p-6 bg-puesto-btn text-puesto-btn-text border-b-[8px] border-puesto-btn-border rounded-3xl shadow-xl hover:shadow-2xl transition-all duration-200 hover:-translate-y-2 min-h-[180px]">

      <!-- El contenido heredará los colores de 'categoria.tema' que pusimos arriba -->
      <div class="mb-4 text-puesto-accent">
        <!-- Dejamos que Thymeleaf use directamente el valor de la BD -->
        <img th:src="@{${categoria.icono}}"
             class="h-16 w-16 md:h-24 md:w-24 object-contain"
             alt="icono">
      </div>

      <span class="text-3xl md:text-5xl font-black uppercase tracking-tighter text-center"
            th:text="${categoria.nombre}">
        </span>

      <div class="w-12 h-1.5 md:w-20 md:h-2 mt-4 rounded-full opacity-50 bg-puesto-accent"></div>
    </a>
  </div>
</div>
</body>
</html>
