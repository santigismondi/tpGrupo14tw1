<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Tp Grupo 14</title>

    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/resources/core/css/main.css}" />

</head>

<body class="auth-wrapper">
    <!-- Background Image -->
    <img th:src="@{/resources/core/img/login_background_abstract.png}" class="background-image" alt="background">

    <main class="glass-card">
        <div class="brand-section">
            <h1 class="brand-logo">Sistema de Control de Etiquetas de Vencimiento</h1>
            <p class="welcome-text">¡Bienvenido!</p>
            <span class="welcome-accent">Registrese para comenzar</span>
        </div>

        <div th:if="${error != null}" class="error-alert">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/validar-login}" method="POST" th:object="${loginDto}">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input th:field="*{email}" id="email" type="email" class="input-styled" placeholder="ejemplo@correo.com"
                    required />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input th:field="*{password}" type="password" id="password" class="input-styled" placeholder="••••••••"
                    required />
            </div>

            <button id="btn-login" class="btn-primary-styled" type="submit">
                Iniciar Sesión
            </button>
        </form>

        <a id="btn-register" th:href="@{/nuevo-usuario}" class="link-secondary">
            ¿No tienes cuenta? Regístrate aquí
        </a>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <script type="module" th:src="@{/resources/core/js/login.js}"></script>
</body>

</html>
